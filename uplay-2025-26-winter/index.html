<!doctype html>
<html lang="en">
<head>
  <script>
    // Safety cleanup: if an old Service Worker exists from past experiments,
    // it can hijack navigations and cause "URL changes but page doesn't".
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations()
        .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DGST UPlay 2025–26 Winter Series</title>

  <meta property="og:title" content="UPlay 2025–26 Winter – DG Series Tracker">
  <meta property="og:description" content="Standings, event results, and player stats for the UPlay 2025–26 Winter disc golf series.">
  <meta property="og:image" content="https://dgseries.com/_shared/images/logo_share.jpg">
  <meta property="og:url" content="https://dgseries.com/uplay-2025-26-winter/">
  <meta property="og:type" content="website">

  <script src="../_shared/version.js?v=2026-03-02-01"></script>
  <script>
    (function () {
      var v = (window.SITE_BUILD || "dev") + "";
      var link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "../_shared/styles.css?v=" + encodeURIComponent(v);
      document.head.appendChild(link);
    })();
  </script>
</head>

<body data-dgst-shell="1">
  <div id="header-slot"></div>

  <div id="view-slot"></div>

  <div id="footer-slot"></div>

  <script>
    (function () {
      var v = (window.SITE_BUILD || "dev") + "";

      function withV(src) {
        return src + (src.indexOf("?") >= 0 ? "&" : "?") + "v=" + encodeURIComponent(v);
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement("script");
          s.src = withV(src);
          s.onload = function () { resolve(); };
          s.onerror = function () {
            console.error("Failed to load script:", src);
            reject(new Error("Failed to load script: " + src));
          };
          document.body.appendChild(s);
        });
      }

      // Load series config first (local), then shared runtime.
      var scripts = [
        "./series.config.js",
        "../_shared/common.js",
        "../_shared/index.js",
        "../_shared/standings.js",
        "../_shared/all-events.js",
        "../_shared/player.js",
        "../_shared/router.js",
      ];

      // Sequential load (order matters).
      scripts.reduce(function (p, src) {
        return p.then(function () { return loadScript(src); });
      }, Promise.resolve());
    })();
  </script>
</body>
</html>
