<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Disc Golf Series Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Open Graph / Link Preview -->
  <meta property="og:title" content="Disc Golf Series Tracker">
  <meta property="og:description" content="Tournament series standings, results, and player stats.">
  <meta property="og:image" content="https://dgseries.com/_shared/images/logo_share.jpg">
  <meta property="og:url" content="https://dgseries.com/">
  <meta property="og:type" content="website">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #222;
    }

    .page {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      text-align: center;
      margin: 12px 0 8px;
    }

    p.subtitle {
      text-align: center;
      color: #555;
      margin: 0 0 28px;
    }

    .series-list {
      display: grid;
      gap: 14px;
    }

    .series-card {
      display: flex;
      align-items: stretch;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #ddd;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .series-card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    .series-card-accent {
      width: 6px;
      flex-shrink: 0;
      background: #ccc;
    }

    .series-card-body {
      padding: 14px 16px;
    }

    .series-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .series-meta {
      font-size: 0.9rem;
      color: #555;
    }

    .series-loading {
      text-align: center;
      color: #888;
      padding: 20px 0;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Disc Golf Series Tracker</h1>
    <p class="subtitle">Select a series to view standings and results</p>

    <div class="series-list" id="seriesList">
      <div class="series-loading">Loading series…</div>
    </div>

    <footer>Powered by DGST</footer>
  </div>

  <script>
    (function () {
      var list = document.getElementById("seriesList");

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderCards(series) {
        if (!series || !series.length) {
          list.innerHTML = "<p style='text-align:center;color:#888;'>No series found.</p>";
          return;
        }
        list.innerHTML = series.map(function (s) {
          var accent = escHtml(s.accent || "#cccccc");
          var title  = escHtml(s.title  || s.slug);
          var sub    = escHtml(s.subtitle || "");
          var href   = "/" + escHtml(s.slug) + "/";
          return (
            '<a class="series-card" href="' + href + '">' +
              '<div class="series-card-accent" style="background:' + accent + '"></div>' +
              '<div class="series-card-body">' +
                '<div class="series-name">' + title + '</div>' +
                (sub ? '<div class="series-meta">' + sub + '</div>' : '') +
              '</div>' +
            '</a>'
          );
        }).join("");
      }

      fetch("/series-registry.json?_=" + Date.now())
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function (data) {
          renderCards(data.series || []);
        })
        .catch(function (err) {
          console.warn("series-registry.json load failed:", err);
          // Fallback: hardcoded list so the page stays useful if registry is missing
          renderCards([
            { slug: "sows-25-26",            title: "Southern Oregon Winter Series", subtitle: "2025–2026", accent: "#f5ff00" },
            { slug: "uplay-2025-26-winter",   title: "UPlay Winter Series",           subtitle: "2025–2026", accent: "#7ed2c6" }
          ]);
        });
    })();
  </script>
</body>
</html>
